name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      stable_release:
        description: 'Create a stable release instead of a prerelease'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release-please.outputs.releases_created }}
      tag_name: ${{ steps.release-please.outputs.tag_name }}
      is_stable: ${{ steps.select-config.outputs.is_stable }}
    steps:
      - name: Select config
        id: select-config
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.stable_release }}" = "true" ]; then
            echo "config-file=.github/release-please-config.json" >> "$GITHUB_OUTPUT"
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
          elif echo "$COMMIT_MSG" | grep -q 'release(litellm-pulse):'; then
            echo "config-file=.github/release-please-config.json" >> "$GITHUB_OUTPUT"
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
          else
            echo "config-file=.github/release-please-config-prerelease.json" >> "$GITHUB_OUTPUT"
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: googleapis/release-please-action@v4
        id: release-please
        with:
          config-file: ${{ steps.select-config.outputs.config-file }}
          manifest-file: .github/.release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  build-and-publish:
    name: Build & Publish to GHCR
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Extract version
        id: version
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major_minor=$(cut -d. -f1,2 <<<"$VERSION")" >> "$GITHUB_OUTPUT"
          echo "major=$(cut -d. -f1 <<<"$VERSION")" >> "$GITHUB_OUTPUT"

      - name: Docker meta (stable)
        id: meta-stable
        if: ${{ needs.release-please.outputs.is_stable == 'true' }}
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.major_minor }}
            type=raw,value=${{ steps.version.outputs.major }}
            type=raw,value=latest

      - name: Docker meta (prerelease)
        id: meta-prerelease
        if: ${{ needs.release-please.outputs.is_stable == 'false' }}
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=dev
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta-stable.outputs.tags || steps.meta-prerelease.outputs.tags }}
          labels: ${{ steps.meta-stable.outputs.labels || steps.meta-prerelease.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }}
          skip-existing: true
